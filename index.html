<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>세스코라이프 케어 – 서비스 결과서</title>
  <!-- PWA -->
  <meta name="theme-color" content="#1a5276">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="세스코케어">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    /* ══════════════════════════════════════════
       CSS 변수
    ══════════════════════════════════════════ */
    :root {
      --pr: #1a5276;
      --ac: #2e86c1;
      --gn: #27ae60;
      --rd: #e74c3c;
      --or: #e67e22;
      --bg: #f0f2f5;
      --wd: #ffffff;
      --bd: #e0e0e0;
      --tx: #333333;
      --tl: #777777;
      --sidebar-w: 310px;
      --header-h: 54px;
      --topnav-h: 44px;
      --botnav-h: 58px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', Apple SD Gothic Neo, sans-serif;
      background: var(--bg);
      color: var(--tx);
    }

    /* ══════════════════════════════════════════
       APP SHELL
    ══════════════════════════════════════════ */
    .app-shell { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .app-header {
      height: var(--header-h);
      background: linear-gradient(135deg, var(--pr), var(--ac));
      color: white;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
      z-index: 300;
    }
    .ah-logo { font-size: 16px; font-weight: bold; letter-spacing: .5px; flex: 1; line-height: 1.3; }
    .ah-logo small { font-size: 11px; opacity: .8; font-weight: normal; display: block; }
    .mode-switcher { display: flex; gap: 4px; }
    .ms-btn {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.35);
      color: white; border-radius: 7px;
      padding: 5px 8px; font-size: 11px; cursor: pointer;
      transition: background .2s; white-space: nowrap; line-height: 1.4;
    }
    .ms-btn.active { background: rgba(255,255,255,.45); font-weight: bold; border-color: rgba(255,255,255,.8); }
    .ms-btn:hover  { background: rgba(255,255,255,.3); }

    /* ══════════════════════════════════════════
       TOP TAB BAR  (fold)
    ══════════════════════════════════════════ */
    .top-tab-bar {
      height: var(--topnav-h);
      background: var(--wd);
      border-bottom: 2px solid var(--ac);
      flex-shrink: 0;
      z-index: 200;
    }
    .top-tab-bar-inner { display: flex; height: 100%; }
    .ttab-btn {
      flex: 1; border: none; background: none;
      font-size: 13px; font-weight: bold; color: var(--tl);
      cursor: pointer; transition: color .15s;
    }
    .ttab-btn.active { color: var(--ac); border-bottom: 3px solid var(--ac); margin-bottom:-2px; }

    /* ══════════════════════════════════════════
       APP BODY
    ══════════════════════════════════════════ */
    .app-body { flex: 1; display: flex; overflow: hidden; }

    /* ══════════════════════════════════════════
       SIDEBAR  (desktop only)
    ══════════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--wd);
      border-right: 1px solid var(--bd);
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-inner { padding: 14px; }
    .sb-new-btn {
      width: 100%; padding: 11px; margin-bottom: 14px;
      background: var(--ac); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: bold; cursor: pointer;
      transition: background .2s;
    }
    .sb-new-btn:hover { background: var(--pr); }
    .sb-cal-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .sb-cal-header span { font-size: 15px; font-weight: bold; color: var(--pr); }
    .sc-nav {
      background: var(--ac); color: white;
      border: none; border-radius: 7px;
      width: 30px; height: 30px; font-size: 16px; cursor: pointer;
    }
    .sb-section-title {
      font-size: 13px; font-weight: bold; color: var(--pr);
      margin: 14px 0 8px; padding-left: 2px;
    }

    /* ══════════════════════════════════════════
       MAIN PANEL
    ══════════════════════════════════════════ */
    .main-panel { flex: 1; overflow-y: auto; background: var(--bg); }
    .view-panel { display: none; padding: 16px; padding-bottom: 80px; }
    .view-panel.active { display: block; }

    /* ══════════════════════════════════════════
       BOTTOM NAV  (mobile)
    ══════════════════════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--wd);
      border-top: 1px solid var(--bd);
      display: flex;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0);
      z-index: 200;
    }
    .bnav-btn {
      flex: 1; border: none; background: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; cursor: pointer; padding: 8px 4px;
      color: var(--tl); font-size: 10px; font-weight: bold;
    }
    .bnav-btn .bn-icon { font-size: 22px; line-height: 1; }
    .bnav-btn.active { color: var(--ac); }

    /* ══════════════════════════════════════════
       CALENDAR  (shared)
    ══════════════════════════════════════════ */
    .cal-nav-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .cal-nav-row h2 { font-size: 17px; font-weight: bold; color: var(--pr); }
    .cal-nav-btn {
      background: var(--ac); color: white;
      border: none; border-radius: 8px;
      width: 34px; height: 34px; font-size: 18px; cursor: pointer;
    }
    .cal-grid-wrap { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); background: var(--ac); }
    .cal-weekdays span { text-align:center; padding:7px 0; color:white; font-size:11px; font-weight:bold; }
    .cal-weekdays span:first-child { color:#ffcdd2; }
    .cal-weekdays span:last-child  { color:#bbdefb; }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); }
    .cal-day {
      aspect-ratio:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      cursor:pointer; border:1px solid #f5f5f5;
      transition:background .1s; user-select:none;
    }
    .cal-day:hover { background:#eaf4fb; }
    .cal-day.empty { cursor:default; }
    .cal-day.today { background:#fff9c4; }
    .cal-day.today .day-num { color:var(--or); font-weight:bold; }
    .cal-day.sunday .day-num  { color:var(--rd); }
    .cal-day.saturday .day-num{ color:#2980b9; }
    .cal-day.selected { background:#eaf4fb; outline:2px solid var(--ac); outline-offset:-2px; }
    .day-num  { font-size:13px; font-weight:600; }
    .day-dot  { width:5px; height:5px; border-radius:50%; background:var(--ac); margin-top:2px; }
    .day-count{ font-size:9px; color:var(--ac); }

    /* ══════════════════════════════════════════
       RECORD CARDS
    ══════════════════════════════════════════ */
    .section-title { font-size:14px; font-weight:bold; color:var(--pr); margin:14px 0 8px; }
    .record-list { display:flex; flex-direction:column; gap:8px; }
    .record-card {
      background:white; border-radius:10px; padding:12px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      display:flex; align-items:center; gap:10px; cursor:pointer;
      transition:all .2s; border:1.5px solid transparent;
    }
    .record-card:hover { box-shadow:0 3px 10px rgba(0,0,0,.12); border-color:var(--ac); }
    .record-card.selected { border-color:var(--ac); background:#eaf4fb; }
    .rcd { background:var(--ac); color:white; border-radius:8px; padding:7px 9px; text-align:center; min-width:50px; flex-shrink:0; }
    .rcd-month { font-size:10px; }
    .rcd-day   { font-size:20px; font-weight:bold; line-height:1.1; }
    .rci { flex:1; min-width:0; }
    .rci-name { font-size:14px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rci-addr { font-size:11px; color:var(--tl); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rci-svc  { font-size:11px; color:var(--ac); margin-top:2px; }
    .rca { display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
    .btn-sm { padding:5px 10px; border:none; border-radius:6px; font-size:11px; cursor:pointer; font-weight:bold; white-space:nowrap; }
    .btn-view { background:#eaf4fb; color:var(--ac); }
    .btn-dl   { background:#eafaf1; color:var(--gn); }
    .btn-del  { background:#fdecea; color:var(--rd); }
    /* Date group header */
    .date-group-hd {
      font-size:13px; font-weight:bold; padding:7px 12px;
      background:var(--ac); color:white;
      border-radius:8px; margin:12px 0 6px;
      display:flex; align-items:center; gap:6px;
    }
    .date-group-hd .dg-cnt { font-size:11px; background:rgba(255,255,255,.25); border-radius:10px; padding:1px 8px; margin-left:auto; }
    .rcd-time { font-size:9px; opacity:.8; margin-top:2px; }

    /* ══════════════════════════════════════════
       PANEL COMMON
    ══════════════════════════════════════════ */
    .panel-nav { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .back-btn {
      background:var(--bg); border:1px solid var(--bd);
      border-radius:7px; padding:7px 12px; font-size:13px;
      cursor:pointer; color:var(--tx); white-space:nowrap; flex-shrink:0;
    }
    .back-btn:hover { background:#e0e4e8; }
    .panel-title { font-size:17px; font-weight:bold; color:var(--pr); flex:1; }
    .header-new-btn {
      background:var(--ac); color:white; border:none;
      border-radius:8px; padding:8px 14px; font-size:13px;
      font-weight:bold; cursor:pointer; white-space:nowrap; flex-shrink:0;
    }
    .date-badge {
      display:inline-block; background:#eaf4fb; color:var(--ac);
      border-radius:6px; padding:4px 10px; font-size:12px; font-weight:bold; margin-left:6px;
    }
    .filter-bar {
      display:flex; align-items:center; gap:8px; margin-bottom:10px;
      background:white; border-radius:8px; padding:8px 12px;
      font-size:13px; box-shadow:0 1px 3px rgba(0,0,0,.08);
    }
    .filter-bar span { flex:1; color:var(--pr); font-weight:bold; }
    .filter-clear {
      background:var(--rd); color:white; border:none;
      border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer;
    }

    /* ══════════════════════════════════════════
       FORM
    ══════════════════════════════════════════ */
    .form-card { background:white; border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:12px; }
    .fsec-title {
      font-size:12px; font-weight:bold; color:white;
      background:var(--pr); padding:6px 12px; border-radius:6px; margin:12px 0 8px;
    }
    .fsec-title:first-child { margin-top:0; }
    .form-row  { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .form-row.r1 { grid-template-columns:1fr; }
    .form-row.r3 { grid-template-columns:1fr 1fr 1fr; }
    .fgrp { display:flex; flex-direction:column; gap:3px; }
    .fgrp label { font-size:11px; font-weight:bold; color:#555; }
    .fgrp input, .fgrp select, .fgrp textarea {
      border:1.5px solid #ddd; border-radius:7px; padding:9px 10px;
      font-size:14px; font-family:inherit; background:#fafafa; width:100%;
      transition:border-color .2s;
    }
    .fgrp input:focus, .fgrp select:focus, .fgrp textarea:focus {
      outline:none; border-color:var(--ac); background:white;
    }
    .fgrp textarea { resize:vertical; min-height:58px; }
    .time-row { display:flex; align-items:center; gap:4px; }
    .time-row input { width:48%; }
    .time-row span  { font-size:12px; color:var(--tl); white-space:nowrap; }
    /* Products */
    .product-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
    .product-item { display:flex; align-items:center; gap:6px; background:#f8f9fa; border-radius:7px; padding:7px 10px; }
    .product-item input[type=checkbox] { width:18px; height:18px; cursor:pointer; flex-shrink:0; }
    .product-item label { font-size:13px; color:#444; flex:1; cursor:pointer; }
    .product-count { width:52px !important; padding:5px 4px !important; border:1.5px solid #ddd; border-radius:5px; font-size:13px !important; text-align:center; background:white !important; }
    .product-count-unit { font-size:11px; color:#888; flex-shrink:0; }
    /* Photo before/after */
    .photo-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px; }
    .photo-col-label {
      text-align:center; font-size:12px; font-weight:bold; padding:5px 8px;
      border-radius:6px 6px 0 0; margin-bottom:-1px;
    }
    .before-label { background:#fff3cd; color:#856404; border:1px solid #ffc107; border-bottom:none; }
    .after-label  { background:#d1f5e0; color:#155724; border:1px solid #28a745; border-bottom:none; }
    .photo-slot-area {
      border:2px dashed #ccc; border-radius:0 0 8px 8px; padding:8px;
      min-height:82px; background:#fafafa;
    }
    .photo-pair-tag { font-size:10px; font-weight:bold; text-align:center; padding:3px 6px; border-radius:4px 4px 0 0; border:1px solid; border-bottom:none; }
    .photo-pair-tag-b { background:#fff3cd; color:#856404; border-color:#ffc107; }
    .photo-pair-tag-a { background:#d1f5e0; color:#155724; border-color:#28a745; }
    .photo-pair-empty-cell { width:68px; height:68px; border:2px dashed #ccc; border-radius:7px; background:#fafafa; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#bbb; font-size:18px; cursor:pointer; flex-shrink:0; }
    .photo-pair-empty-cell small { font-size:9px; margin-top:2px; }
    .photo-pair-empty-cell:hover { border-color:var(--ac); color:var(--ac); background:#eaf4fb; }
    .photo-thumbs-grid { display:flex; flex-wrap:wrap; gap:5px; align-items:flex-start; }
    .photo-thumb {
      position:relative; width:68px; height:68px; cursor:pointer;
      border-radius:7px; overflow:hidden; border:2px solid #ddd; flex-shrink:0;
      transition:border-color .15s;
    }
    .photo-thumb:hover { border-color:var(--ac); }
    .photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-thumb-overlay {
      position:absolute; inset:0; background:rgba(0,0,0,0);
      transition:background .15s; display:flex;
      align-items:center; justify-content:center;
    }
    .photo-thumb:hover .photo-thumb-overlay { background:rgba(0,0,0,.35); }
    .photo-thumb-overlay span { color:white; font-size:18px; opacity:0; transition:opacity .15s; }
    .photo-thumb:hover .photo-thumb-overlay span { opacity:1; }
    .photo-add-cell {
      width:68px; height:68px; border:2px dashed #ccc; border-radius:7px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      cursor:pointer; color:#bbb; font-size:24px; flex-shrink:0;
      transition:border-color .15s, color .15s, background .15s; background:white;
    }
    .photo-add-cell:hover { border-color:var(--ac); color:var(--ac); background:#eaf4fb; }
    .photo-add-cell small { font-size:9px; margin-top:2px; }
    .photo-empty-state {
      width:100%; min-height:66px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:4px;
      cursor:pointer; color:#bbb; font-size:11px;
    }
    .photo-previews { display:flex; flex-wrap:wrap; gap:4px; }
    .photo-previews img { width:60px; height:60px; object-fit:cover; border-radius:5px; border:1px solid #ddd; cursor:pointer; }
    /* Photo viewer */
    #photo-viewer { position:fixed; inset:0; background:rgba(0,0,0,.96); z-index:900; flex-direction:column; align-items:center; justify-content:center; }
    .vw-top { position:absolute; top:0; left:0; right:0; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; }
    .vw-btn { background:rgba(255,255,255,.18); border:none; color:white; border-radius:50%; width:42px; height:42px; font-size:22px; cursor:pointer; }
    .vw-side { position:absolute; top:50%; transform:translateY(-50%); }
    .vw-side.left  { left:8px; }
    .vw-side.right { right:8px; }
    /* Check table */
    .check-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:8px; }
    .check-table th { background:var(--ac); color:white; padding:7px 5px; text-align:center; }
    .check-table td { border:1px solid #ddd; padding:5px 6px; }
    .check-table .ctr { text-align:center; width:13%; }
    .check-table .cno { text-align:center; width:8%; }
    /* Signature */
    .sig-row  { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
    .sig-box  { border:2px dashed #ddd; border-radius:8px; padding:10px; text-align:center; cursor:pointer; transition:border-color .2s; }
    .sig-box:hover { border-color:var(--ac); }
    .sig-box label { font-size:12px; font-weight:bold; color:#555; display:block; margin-bottom:6px; cursor:pointer; }
    .sig-canvas { border:1px solid #ccc; border-radius:4px; touch-action:none; background:white; display:block; margin:0 auto; }
    .btn-clear-sig { margin-top:5px; background:#eee; border:none; border-radius:5px; padding:5px 12px; font-size:11px; cursor:pointer; width:100%; }
    /* 전체화면 서명 오버레이 */
    #sig-fullscreen { position:fixed; inset:0; background:#1a5276; z-index:1000; display:none; flex-direction:column; }
    #sig-fullscreen.open { display:flex; }
    .sig-fs-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:rgba(0,0,0,.2); flex-shrink:0; }
    .sig-fs-title { color:white; font-size:16px; font-weight:bold; }
    .sig-fs-hint  { color:rgba(255,255,255,.7); font-size:11px; margin-top:2px; }
    #sig-fs-canvas { flex:1; display:block; background:white; touch-action:none; width:100%; }
    .sig-fs-footer { display:flex; gap:10px; padding:12px 16px; background:rgba(0,0,0,.2); flex-shrink:0; }
    .sig-fs-btn { flex:1; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer; }
    .sig-fs-clear { background:rgba(255,255,255,.15); color:white; }
    .sig-fs-save  { background:#27ae60; color:white; }
    /* Button bar */
    .btn-bar { display:flex; gap:8px; margin-top:12px; }
    .btn-main { flex:1; padding:13px 6px; border:none; border-radius:10px; font-size:14px; font-weight:bold; cursor:pointer; transition:opacity .2s; }
    .btn-main:active { opacity:.8; }
    .btn-save   { background:var(--ac); color:white; }
    .btn-print  { background:var(--gn); color:white; }
    .btn-cancel { background:#eee; color:#555; }
    .btn-danger { background:#fdecea; color:var(--rd); }

    /* ══════════════════════════════════════════
       DETAIL VIEW
    ══════════════════════════════════════════ */
    .detail-card { background:white; border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:12px; }
    .detail-table { width:100%; border-collapse:collapse; font-size:13px; }
    .detail-table th {
      background:#eaf4fb; padding:7px 10px; text-align:left;
      color:var(--pr); font-weight:bold; width:33%; border:1px solid #d0e8f5;
    }
    .detail-table td { padding:7px 10px; border:1px solid #d0e8f5; }
    .dt-section { font-size:13px; font-weight:bold; color:var(--pr); margin:12px 0 6px; }
    .cyes { color:var(--gn); font-weight:bold; }
    .cno  { color:var(--rd); }
    .cmid { color:var(--or); }

    /* ══════════════════════════════════════════
       MODAL
    ══════════════════════════════════════════ */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.55); z-index:500;
      align-items:flex-end; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal-sheet {
      background:white; border-radius:20px 20px 0 0;
      width:100%; max-width:640px; max-height:92vh;
      overflow-y:auto; padding:20px 16px 32px;
      animation:slideUp .25s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:40px; height:4px; background:#ddd; border-radius:2px; margin:0 auto 14px; }
    .modal-title { font-size:16px; font-weight:bold; color:var(--pr); text-align:center; margin-bottom:12px; }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    .toast {
      position:fixed; bottom:80px; left:50%;
      transform:translateX(-50%) translateY(16px);
      background:rgba(30,30,30,.92); color:white;
      padding:9px 18px; border-radius:20px; font-size:13px;
      opacity:0; transition:all .3s; z-index:600; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════════
       SEARCH / LIST HEADER
    ══════════════════════════════════════════ */
    .search-wrap { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .search-wrap input {
      flex:1; border:1.5px solid #ddd; border-radius:8px;
      padding:10px 12px; font-size:14px; font-family:inherit;
    }
    .search-wrap input:focus { outline:none; border-color:var(--ac); }
    .list-header-row { display:flex; align-items:center; margin-bottom:10px; }
    .list-header-row .panel-title { flex:1; }

    /* ══════════════════════════════════════════
       EMPTY STATE
    ══════════════════════════════════════════ */
    .empty-state { text-align:center; padding:40px 20px; color:#bbb; }
    .empty-state .es-icon { font-size:42px; margin-bottom:8px; }
    .empty-state p { font-size:13px; }

    /* ════════════════════════════════════════════
       RESPONSIVE — 3가지 모드
    ════════════════════════════════════════════ */

    /* ── 기본: 모바일 (<600px) ──
       bottom-nav 표시 / top-tab 숨김 / sidebar 숨김 */
    .bottom-nav  { display:flex; }
    .top-tab-bar { display:none; }
    .sidebar     { display:none; }
    .view-panel  { padding-bottom:90px; }

    /* ── 폴드 / 태블릿 (600px ~ 1099px) ──
       top-tab 표시 / bottom-nav 숨김 */
    @media (min-width:600px) {
      .bottom-nav  { display:none; }
      .top-tab-bar { display:block; }
      .view-panel  { padding-bottom:30px; }
    }

    /* ── 데스크탑 (1100px+) ──
       sidebar 표시 / tab bar/bottom nav 모두 숨김 */
    @media (min-width:1100px) {
      .bottom-nav  { display:none; }
      .top-tab-bar { display:none; }
      .sidebar     { display:flex; }
      .view-panel  { padding:20px 24px 30px; }
      .form-row.r3 { grid-template-columns:1fr 1fr 1fr; }
    }

    /* ── 수동 모드 강제 오버라이드 ──
       JS에서 body에 mode-* 클래스 추가 시 우선 적용 */
    body.mode-mobile .bottom-nav  { display:flex !important; }
    body.mode-mobile .top-tab-bar { display:none !important; }
    body.mode-mobile .sidebar     { display:none !important; }
    body.mode-mobile .view-panel  { padding-bottom:90px !important; }

    body.mode-fold .bottom-nav  { display:none !important; }
    body.mode-fold .top-tab-bar { display:block !important; }
    body.mode-fold .sidebar     { display:none !important; }
    body.mode-fold .view-panel  { padding-bottom:30px !important; }

    body.mode-desktop .bottom-nav  { display:none !important; }
    body.mode-desktop .top-tab-bar { display:none !important; }
    body.mode-desktop .sidebar     { display:flex !important; }
    body.mode-desktop .view-panel  { padding:20px 24px 30px !important; }
    body.mode-desktop .form-row.r3 { grid-template-columns:1fr 1fr 1fr !important; }

    /* 데스크탑 모달: 하단 슬라이드 대신 중앙 다이얼로그 */
    body.mode-desktop .modal-overlay { align-items:center; }
    body.mode-desktop .modal-sheet {
      border-radius:16px; max-height:85vh; max-width:700px;
      animation:fadeScale .2s ease;
    }
    @keyframes fadeScale { from{transform:scale(.96);opacity:0} to{transform:scale(1);opacity:1} }

    /* ══════════════════════════════════════════
       PRINT
    ══════════════════════════════════════════ */
    @media print {
      .app-header, .sidebar, .top-tab-bar, .bottom-nav,
      .btn-bar, .toast, .mode-switcher, .panel-nav { display:none !important; }
      .app-body { display:block !important; }
      .main-panel { height:auto !important; overflow:visible !important; }
      .view-panel { display:block !important; padding:0 !important; }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- HEADER -->
  <header class="app-header">
    <div class="ah-logo">
      [ 세스코라이프 케어 ]
      <small>서비스 결과서 관리</small>
    </div>
    <div class="mode-switcher">
      <button class="ms-btn" id="ms-mobile"  onclick="setMode('mobile',true)"  title="일반 휴대폰">📱 모바일</button>
      <button class="ms-btn" id="ms-fold"    onclick="setMode('fold',true)"    title="폴드/태블릿">📲 폴드</button>
      <button class="ms-btn" id="ms-desktop" onclick="setMode('desktop',true)" title="데스크탑">🖥️ PC</button>
      <button class="ms-btn" id="ms-auto"    onclick="resetModeAuto()"         title="화면 크기에 맞게 자동 전환">🔄 자동</button>

  <!-- TOP TAB BAR (fold) -->

      <button class="ttab-btn"        onclick="switchTab('form')"     data-tab="form">✏️ 작성</button>
    </div>
  </div>

  <!-- APP BODY -->
  <div class="app-body">

    <!-- SIDEBAR (desktop) -->
    <aside class="sidebar" id="sidebar">

        <div class="sb-cal-header">

          <span id="sb-cal-title"></span>

        </div>
        <div class="cal-grid-wrap">
          <div class="cal-weekdays">
            <span>일</span><span>월</span><span>화</span>
            <span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="cal-days" id="sb-cal-days"></div>
        </div>

        <div class="sb-section-title" id="sb-month-title"></div>
        <div class="record-list" id="sb-month-list"></div>
      </div>
    </aside>

    <!-- MAIN PANEL -->
    <main class="main-panel" id="main-panel">

      <!-- ① 달력 패널 (mobile / fold) -->
      <div class="view-panel active" id="panel-calendar">
        <div class="cal-nav-row">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <h2 id="main-cal-title"></h2>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid-wrap">
          <div class="cal-weekdays">
            <span>일</span><span>월</span><span>화</span>
            <span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="cal-days" id="main-cal-days"></div>
        </div>
        <div class="section-title">이번 달 기록</div>
        <div class="record-list" id="main-month-list"></div>
      </div>

      <!-- ② 목록 패널 -->
      <div class="view-panel" id="panel-list">
        <div class="list-header-row">
          <span class="panel-title" id="list-panel-title">전체 기록</span>
          <button class="header-new-btn" onclick="newRecord()">+ 새 작성</button>
        </div>
        <div class="search-wrap">
          <input type="search" id="search-input"
            placeholder="고객명·주소·서비스 검색..."
            oninput="renderList()" autocomplete="off">
        </div>
        <div id="filter-bar" class="filter-bar" style="display:none;">
          <span id="filter-bar-text"></span>
          <button class="filter-clear" onclick="clearDateFilter()">✕ 필터 해제</button>
        </div>
        <div class="record-list" id="all-list"></div>

      <!-- ③ 작성 패널 -->

          <span class="panel-title">서비스 결과서</span>

        </div>

        <div class="form-card">
          <div class="fsec-title">※ 고객 정보 및 서비스 내용 확인</div>
          <div class="form-row">
            <div class="fgrp"><label>고객명</label><input type="text" id="f-name" placeholder="홍길동"></div>
            <div class="fgrp"><label>주소</label><input type="text" id="f-addr" placeholder="서울시 강남구..."></div>
          </div>

            <div class="fgrp"><label>전화번호</label><input type="tel" id="f-phone" placeholder="010-0000-0000"></div>
            <div class="fgrp"><label>서비스</label><input type="text" id="f-service" placeholder="서비스명"></div>
          </div>
          <div class="form-row">
            <div class="fgrp"><label>주문번호</label><input type="text" id="f-order" placeholder="주문번호"></div>
            <div class="fgrp"><label>확정통화</label><input type="text" id="f-confirm" placeholder="확정통화"></div>
          </div>
          <div class="form-row r1">
            <div class="fgrp"><label>주차정보</label><input type="text" id="f-parking" placeholder="주차 가능 여부 / 위치"></div>
          </div>

          <div class="fsec-title">대상제품 (대수 입력 가능)</div>
          <div class="product-grid">
            <div class="product-item"><input type="checkbox" id="p-1way"><label for="p-1way">1way</label><input type="number" class="product-count" id="pc-1way" min="1" max="99" placeholder="-"><span class="product-count-unit">대</span></div>
            <div class="product-item"><input type="checkbox" id="p-4way"><label for="p-4way">4way</label><input type="number" class="product-count" id="pc-4way" min="1" max="99" placeholder="-"><span class="product-count-unit">대</span></div>
            <div class="product-item"><input type="checkbox" id="p-stand"><label for="p-stand">스탠드</label><input type="number" class="product-count" id="pc-stand" min="1" max="99" placeholder="-"><span class="product-count-unit">대</span></div>
            <div class="product-item"><input type="checkbox" id="p-wall"><label for="p-wall">벽걸이</label><input type="number" class="product-count" id="pc-wall" min="1" max="99" placeholder="-"><span class="product-count-unit">대</span></div>
            <div class="product-item" style="grid-column:span 2"><input type="checkbox" id="p-etc"><label for="p-etc">기타</label><input type="number" class="product-count" id="pc-etc" min="1" max="99" placeholder="-"><span class="product-count-unit">대</span></div>
          </div>

          <div class="fsec-title">사진 (작업 전/후) — 전/후 쌍으로 나란히 표시</div>
          <div id="photo-pair-container"></div>
          <input type="file" id="photo-input-before" accept="image/*" multiple style="display:none;" onchange="handlePhoto(event,'before')">
          <input type="file" id="photo-input-after"  accept="image/*" multiple style="display:none;" onchange="handlePhoto(event,'after')">

          <div class="fsec-title">서비스 일정</div>
          <div class="form-row">
            <div class="fgrp"><label>서비스예정일</label><input type="date" id="f-svcdate"></div>
            <div class="fgrp">
              <label>예상작업시간</label>
              <div class="time-row">
                <input type="number" id="f-time-h" placeholder="시간" min="0" max="24">
                <span>시간</span>
                <input type="number" id="f-time-m" placeholder="분" min="0" max="59">
                <span>분</span>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="fgrp">
              <label>고객요청사항</label>
              <textarea id="f-request" placeholder="고객 요청사항"></textarea>
            </div>
            <div class="fgrp">
              <label>작업지시서</label>
              <select id="f-workorder">
                <option value="">선택</option>
                <option value="있음">있음</option>
                <option value="없음">없음</option>
              </select>
            </div>
          </div>

          <div class="fsec-title">※ 사전점검항목 및 자기검사 결과</div>
          <div class="form-row">
            <div class="fgrp"><label>외관사항</label><input type="text" id="f-exterior" placeholder="외관 상태"></div>
            <div class="fgrp"><label>메터리얼</label><input type="text" id="f-material" placeholder="메터리얼"></div>
          </div>
          <div class="form-row">
            <div class="fgrp"><label>세척장비</label><input type="text" id="f-washer" placeholder="세척장비"></div>
            <div class="fgrp"><label>곰팡이 살균제</label><input type="text" id="f-mold" placeholder="곰팡이 살균제"></div>
          </div>
          <div class="form-row">
            <div class="fgrp"><label>기타도구</label><input type="text" id="f-tool" placeholder="기타도구"></div>
            <div class="fgrp"><label>UV살균기</label><input type="text" id="f-uv" placeholder="UV살균기"></div>
          </div>

          <div class="fsec-title">※ 고객과 사전 미팅</div>
          <table class="check-table">
            <thead>
              <tr><th class="cno">NO</th><th>설명</th><th class="ctr">그렇다</th><th class="ctr">보통</th><th class="ctr">아니다</th></tr>
            </thead>
            <tbody id="pre-meeting-body"></tbody>
          </table>

          <div class="fsec-title">※ 고객과 사후 미팅</div>
          <table class="check-table">
            <thead>
              <tr><th class="cno">NO</th><th>설명</th><th class="ctr">그렇다</th><th class="ctr">보통</th><th class="ctr">아니다</th></tr>
            </thead>
            <tbody id="post-meeting-body"></tbody>
          </table>

          <div class="fsec-title">서명</div>
          <div class="sig-row">
            <div class="sig-box" onclick="openSigFullscreen('sig-customer')">
              <label>고객 서명 <span style="font-size:10px;color:var(--ac);">탭하여 서명</span></label>
              <canvas class="sig-canvas" id="sig-customer" width="160" height="80"></canvas>
              <button class="btn-clear-sig" onclick="event.stopPropagation();clearSig('sig-customer')">지우기</button>
            </div>
            <div class="sig-box" onclick="openSigFullscreen('sig-partner')">
              <label>파트너 서명 <span style="font-size:10px;color:var(--ac);">탭하여 서명</span></label>
              <canvas class="sig-canvas" id="sig-partner" width="160" height="80"></canvas>
              <button class="btn-clear-sig" onclick="event.stopPropagation();clearSig('sig-partner')">지우기</button>
            </div>
          </div>
        </div><!-- /form-card -->

        <div class="btn-bar">
          <button class="btn-main btn-cancel" onclick="goBack()">취소</button>
          <button class="btn-main btn-save"   onclick="saveRecord()">💾 저장</button>

      <!-- ④ 상세 패널 (desktop inline) -->

          <button class="back-btn" onclick="goBack()">← 뒤로</button>

    </button>
    <button class="bnav-btn" onclick="switchTab('list')" data-bnav="list">

    </button>

</div><!-- /app-shell -->

    <div class="modal-handle"></div>
    <div class="modal-title" id="dm-title"></div>

      <button class="btn-main btn-cancel" onclick="closeModal('date-modal')">취소</button>

<!-- PHOTO VIEWER -->
<div id="photo-viewer" style="display:none;">
  <div class="vw-top">
    <button class="vw-btn" id="viewer-prev" onclick="viewerPrev()">‹</button>
    <span id="viewer-counter" style="color:white;font-size:13px;font-weight:bold;"></span>
    <button class="vw-btn" onclick="closeViewer()">✕</button>

  <div class="vw-side right"><button class="vw-btn" id="viewer-next2" onclick="viewerNext()">›</button></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 전체화면 서명 오버레이 -->
<div id="sig-fullscreen">
  <div class="sig-fs-header">
    <div>
      <div class="sig-fs-title" id="sig-fs-title">서명</div>
      <div class="sig-fs-hint">손가락으로 서명해 주세요</div>
    </div>
    <button onclick="closeSigFullscreen()" style="background:rgba(255,255,255,.15);border:none;color:white;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;">✕ 취소</button>
  </div>
  <canvas id="sig-fs-canvas"></canvas>
  <div class="sig-fs-footer">
    <button class="sig-fs-btn sig-fs-clear" onclick="clearSigFullscreen()">🗑️ 다시 그리기</button>
    <button class="sig-fs-btn sig-fs-save"  onclick="saveSigFullscreen()">✅ 저장하기</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════ -->
<script>
/* ─── 상수 ─── */
const DB_KEY   = 'sesco_records';
const MODE_KEY = 'sesco_mode';

const PRE_ITEMS = [
  '서비스 작업 내용에 대해 설명을 잘 들었다',
  '세스코만의 UV 살균기 사용에 대해 설명을 잘 들었다',
  '세스코만의 곰팡이 세정제 사용에 대해 설명을 잘 들었다',
  '제품의 외관과 동작에 이상없음을 사전에 확인하였다',
  '개인 물품과 귀중품을 이동하도록 사전에 안내받았다',
];
const POST_ITEMS = [
  '서비스 작업 내용에 대해 설명을 잘 들었다',
  '세스코만의 UV 살균기 사용하는 것에 대해 만족한다',
  '세스코만의 곰팡이 세정제 사용하는 것에 대해 만족한다',
  '제품의 외관과 동작에 이상없음을 사후에 확인하였다',
  '거실과 욕실의 사후 청소와 마무리가 깔끔했다',
];

/* ─── 상태 ─── */
let calYear, calMonth;
const today = new Date();
let selectedDate     = null;
let currentEditId    = null;
let photosBeforeList = [];
let photosAfterList  = [];
let listDateFilter   = null;
let prevPanel        = null;
let activePhotoCtx   = null;  // {type:'before'|'after', idx:number}
let viewerList       = [];
let viewerIdx        = 0;
let detailPhotos     = {before:[],after:[]};

/* ─── DB 헬퍼 ─── */
function allRecs()      { try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; } catch(e) { return []; } }
function saveRecs(r)    { localStorage.setItem(DB_KEY, JSON.stringify(r)); }
function getRec(id)     { return allRecs().find(r => r.id === id); }
function upsertRec(rec) { const a=allRecs(); const i=a.findIndex(r=>r.id===rec.id); if(i>=0) a[i]=rec; else a.unshift(rec); saveRecs(a); }
function deleteRecById(id) { saveRecs(allRecs().filter(r=>r.id!==id)); }
function confirmDeleteRec(id) {
  const r=getRec(id); if(!r) return;
  const name=r.name||'(이름없음)';
  if(!confirm(`[${name}] 기록을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  deleteRecById(id);
  renderList(); renderCalendar();
  if(isDesktopMode()) showPanel('list',false);
  showToast('🗑️ 삭제되었습니다');
}

/* ─── 모드 감지 ─── */
function isDesktopMode() {
  if (document.body.classList.contains('mode-desktop')) return true;
  if (document.body.classList.contains('mode-mobile') || document.body.classList.contains('mode-fold')) return false;
  return window.innerWidth >= 1100;
}

/* ─── 모드 전환 ─── */
function setMode(mode, save) {
  document.body.classList.remove('mode-mobile','mode-fold','mode-desktop');
  document.body.classList.add('mode-' + mode);
  if (save) localStorage.setItem(MODE_KEY, mode);

  document.querySelectorAll('.ms-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('ms-' + mode);
  if (btn) btn.classList.add('active');

  renderCalendar();

  if (mode === 'desktop') {
    // 달력 패널이 active면 목록으로 전환
    const active = document.querySelector('.view-panel.active');
    if (!active || active.id === 'panel-calendar') {
      showPanel('list', false);
    }
  } else {
    // mobile/fold: 현재 active 패널 이름으로 탭 설정
    const active = document.querySelector('.view-panel.active');
    let name = active ? active.id.replace('panel-','') : 'calendar';
    if (name === 'detail') name = 'list';
    if (name === 'calendar' && mode !== 'mobile' && mode !== 'fold') name = 'list';
    switchTab(name);
  }
}

function autoDetectMode() {
  // 항상 현재 화면 크기 기준으로 시작 (저장값 무시)
  applyWidthMode();
}

function applyWidthMode() {
  const w = window.innerWidth;
  // 수동 고정값이 있고, 화면 크기 범주가 저장값과 다르면 저장값 무시
  const saved = localStorage.getItem(MODE_KEY);
  const detected = w >= 1100 ? 'desktop' : w >= 600 ? 'fold' : 'mobile';
  if (saved && saved !== detected) {
    // 화면 크기 범주가 바뀌었으면 자동으로 맞춤 (고정 해제)
    localStorage.removeItem(MODE_KEY);
  }
  setMode(detected);
}

function resetModeAuto() {
  localStorage.removeItem(MODE_KEY);
  applyWidthMode();
  showToast('화면 크기에 맞게 자동 전환되었습니다');
}

/* ─── 탭 전환 (mobile / fold) ─── */
function switchTab(name) {
  document.querySelectorAll('.view-panel').forEach(v => v.classList.remove('active'));
  const panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.add('active');

  if (name === 'list')     renderList();
  if (name === 'calendar') renderCalendar();
  if (name === 'form' && !selectedDate) setFormDate(formatDate(today));

  document.querySelectorAll('[data-bnav]').forEach(b => b.classList.toggle('active', b.dataset.bnav === name));
  document.querySelectorAll('[data-tab]') .forEach(b => b.classList.toggle('active', b.dataset.tab  === name));

  const mp = document.getElementById('main-panel');
  if (mp) mp.scrollTop = 0;
}

/* ─── 패널 전환 (desktop) ─── */
function showPanel(name, savePrev) {
  if (savePrev !== false) {
    const active = document.querySelector('.view-panel.active');
    if (active) prevPanel = active.id.replace('panel-','');
  }
  document.querySelectorAll('.view-panel').forEach(v => v.classList.remove('active'));
  const panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.add('active');

  if (name === 'list') renderList();
  const mp = document.getElementById('main-panel');
  if (mp) mp.scrollTop = 0;
}

function goBack() {
  if (isDesktopMode()) showPanel(prevPanel || 'list', false);
  else switchTab('calendar');
}

/* ─── 달력 ─── */
function initCalendar() {
  calYear  = today.getFullYear();
  calMonth = today.getMonth();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const monthLabel = `${calYear}년 ${calMonth+1}월`;

  // 날짜별 건수 맵
  const countMap = {};
  allRecs().forEach(r => { if(r.date) countMap[r.date] = (countMap[r.date]||0)+1; });

  // sidebar 달력
  document.getElementById('sb-cal-title').textContent = monthLabel;
  renderCalDays('sb-cal-days', countMap);
  renderMonthList('sb-month-list', 'sb-month-title', countMap);

  // main 달력
  document.getElementById('main-cal-title').textContent = monthLabel;
  renderCalDays('main-cal-days', countMap);
  renderMonthList('main-month-list', null, countMap);
}

function renderCalDays(containerId, countMap) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth+1, 0).getDate();
  let html = '';
  for (let i=0; i<firstDay; i++) html += '<div class="cal-day empty"></div>';
  for (let d=1; d<=lastDate; d++) {
    const ds  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(calYear, calMonth, d).getDay();
    const isTod = calYear===today.getFullYear() && calMonth===today.getMonth() && d===today.getDate();
    const cnt = countMap[ds]||0;
    const cls = ['cal-day',
      isTod ? 'today':'',
      dow===0 ? 'sunday' : dow===6 ? 'saturday' : '',
      selectedDate===ds ? 'selected':''].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="onDayClick('${ds}')">
      <span class="day-num">${d}</span>
      ${cnt>0 ? `<div class="day-dot"></div><span class="day-count">${cnt}건</span>` : ''}
    </div>`;
  }
  el.innerHTML = html;
}

function renderMonthList(listId, titleId, countMap) {
  const monthPrefix = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const recs = allRecs()
    .filter(r => r.date && r.date.startsWith(monthPrefix))
    .sort((a,b) => b.date.localeCompare(a.date));
  if (titleId) {
    const tel = document.getElementById(titleId);
    if (tel) tel.textContent = `${calMonth+1}월 기록 (${recs.length}건)`;
  }
  const lel = document.getElementById(listId);
  if (!lel) return;
  lel.innerHTML = recs.length
    ? recs.map(r => recCardHTML(r)).join('')
    : '<div class="empty-state"><div class="es-icon">📭</div><p>이번 달 기록 없음</p></div>';
}

function onDayClick(ds) {
  selectedDate = ds;
  renderCalendar();

  if (isDesktopMode()) {
    const cnt = allRecs().filter(r => r.date===ds).length;
    if (cnt > 0) {
      listDateFilter = ds;
      showPanel('list');
    } else {
      currentEditId = null;
      photoDataList = [];
      resetFormFields();
      setFormDate(ds);
      showPanel('form');
    }
  } else {
    document.getElementById('date-modal-label').textContent = formatDateKR(ds);
    openModal('date-modal');
  }
}

function confirmDate() {
  closeModal('date-modal');
  currentEditId = null;
  photoDataList = [];
  resetFormFields();
  setFormDate(selectedDate);
  if (isDesktopMode()) showPanel('form');
  else switchTab('form');
}

/* ─── 목록 ─── */
function renderList() {
  const q = (document.getElementById('search-input')?.value||'').trim().toLowerCase();
  let recs = allRecs().sort((a,b)=>{
    const dc=(b.date||'').localeCompare(a.date||'');
    if(dc!==0) return dc;
    return (b.savedAt||'').localeCompare(a.savedAt||'');
  });

  const fb = document.getElementById('filter-bar');
  const ft = document.getElementById('filter-bar-text');
  const lt = document.getElementById('list-panel-title');
  if (listDateFilter) {
    recs = recs.filter(r => r.date===listDateFilter);
    fb.style.display='flex';
    ft.textContent=`${formatDateKR(listDateFilter)} 기록 (${recs.length}건)`;
    if(lt) lt.textContent='날짜별 기록';
  } else {
    fb.style.display='none';
    if(lt) lt.textContent='전체 기록';
  }
  if (q) recs = recs.filter(r =>
    (r.name||'').toLowerCase().includes(q) ||
    (r.addr||'').toLowerCase().includes(q) ||
    (r.service||'').toLowerCase().includes(q)
  );
  const el = document.getElementById('all-list');
  if (!recs.length) { el.innerHTML='<div class="empty-state"><div class="es-icon">🔍</div><p>기록이 없습니다</p></div>'; return; }
  // 날짜별 그룹핑
  const groups={};
  recs.forEach(r=>{ const k=r.date||'날짜없음'; (groups[k]=groups[k]||[]).push(r); });
  const sortedDates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=sortedDates.map(date=>{
    const dayRecs=groups[date];
    const hd=date==='날짜없음'?'날짜없음':formatDateKR(date);
    const cards=dayRecs.map(r=>recCardHTML(r)).join('');
    return `<div class="date-group-hd">📅 ${hd}<span class="dg-cnt">${dayRecs.length}건</span></div><div class="record-list" style="margin-bottom:4px;">${cards}</div>`;
  }).join('');
}

function clearDateFilter() {
  listDateFilter = null;
  renderList();
}

function recCardHTML(r) {
  const p = (r.date||'').split('-');
  const tstr = r.savedAt ? new Date(r.savedAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}) : '';
  return `<div class="record-card" id="card-${r.id}" onclick="openDetail('${r.id}')">
    <div class="rcd">
      <div class="rcd-month">${p[1]?parseInt(p[1])+'월':'-'}</div>
      <div class="rcd-day">${p[2]?parseInt(p[2]):'-'}</div>
      ${tstr?`<div class="rcd-time">${tstr}</div>`:''}
    </div>
    <div class="rci">
      <div class="rci-name">${r.name||'(이름 없음)'}</div>
      <div class="rci-addr">${r.addr||'-'}</div>
      <div class="rci-svc">${r.service||''}</div>
    </div>
    <div class="rca">
      <button class="btn-sm btn-view" onclick="event.stopPropagation();openDetail('${r.id}')">보기</button>
      <button class="btn-sm btn-dl"   onclick="event.stopPropagation();downloadById('${r.id}')">저장</button>
      <button class="btn-sm btn-del"  onclick="event.stopPropagation();confirmDeleteRec('${r.id}')">🗑️</button>
    </div>
  </div>`;
}

/* ─── 새 기록 ─── */
function newRecord() {
  currentEditId = null;
  resetFormFields();
  setFormDate(selectedDate || formatDate(today));
  if (isDesktopMode()) showPanel('form');
  else switchTab('form');
}

/* ─── 폼 ─── */
function resetFormFields() {
  ['f-name','f-addr','f-phone','f-service','f-order','f-confirm','f-parking',
   'f-exterior','f-material','f-washer','f-mold','f-tool','f-uv',
   'f-request','f-svcdate','f-time-h','f-time-m'].forEach(id => {
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('f-workorder').value='';
  ['p-1way','p-4way','p-stand','p-wall','p-etc'].forEach(id=>{
    document.getElementById(id).checked=false;
  });
  ['pc-1way','pc-4way','pc-stand','pc-wall','pc-etc'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  photosBeforeList=[]; photosAfterList=[];
  renderPairThumbs();
  buildCheckRows(PRE_ITEMS, 'pre', document.getElementById('pre-meeting-body'));
  buildCheckRows(POST_ITEMS,'post',document.getElementById('post-meeting-body'));
  clearSig('sig-customer'); clearSig('sig-partner');
}

function setFormDate(ds) {
  selectedDate=ds;
  const badge=document.getElementById('form-date-badge');
  badge.textContent=ds?formatDateKR(ds):'날짜 없음';
  const svc=document.getElementById('f-svcdate');
  if(svc&&!svc.value) svc.value=ds||'';
}

function buildCheckRows(items, prefix, tbody) {
  if(!tbody) return;
  tbody.innerHTML=items.map((txt,i)=>`
    <tr>
      <td class="cno">${i+1}</td>
      <td style="font-size:12px;">${txt}</td>
      <td class="ctr"><input type="radio" name="${prefix}-${i}" value="그렇다" checked></td>
      <td class="ctr"><input type="radio" name="${prefix}-${i}" value="보통"></td>
      <td class="ctr"><input type="radio" name="${prefix}-${i}" value="아니다"></td>
    </tr>`).join('');
}

function getCheckVals(prefix, items) {
  return items.map((_,i)=>{
    for(const r of document.querySelectorAll(`input[name="${prefix}-${i}"]`))
      if(r.checked) return r.value;
    return '그렇다';
  });
}

function saveRecord() {
  const ds = selectedDate||formatDate(today);
  const rec = {
    id: currentEditId||('rec_'+Date.now()),
    date: ds,
    name:gv('f-name'), addr:gv('f-addr'), phone:gv('f-phone'),
    service:gv('f-service'), order:gv('f-order'), confirm:gv('f-confirm'),
    parking:gv('f-parking'),
    products:{
      '1way':{checked:document.getElementById('p-1way').checked, count:document.getElementById('pc-1way').value||''},
      '4way':{checked:document.getElementById('p-4way').checked, count:document.getElementById('pc-4way').value||''},
      '스탠드':{checked:document.getElementById('p-stand').checked, count:document.getElementById('pc-stand').value||''},
      '벽걸이':{checked:document.getElementById('p-wall').checked, count:document.getElementById('pc-wall').value||''},
      '기타':{checked:document.getElementById('p-etc').checked, count:document.getElementById('pc-etc').value||''},
    },
    photosBefore:photosBeforeList.slice(),
    photosAfter:photosAfterList.slice(),
    svcdate:gv('f-svcdate'), timeH:gv('f-time-h'), timeM:gv('f-time-m'),
    request:gv('f-request'), workorder:document.getElementById('f-workorder').value,
    exterior:gv('f-exterior'), material:gv('f-material'),
    washer:gv('f-washer'), mold:gv('f-mold'), tool:gv('f-tool'), uv:gv('f-uv'),
    preMeeting:getCheckVals('pre',PRE_ITEMS),
    postMeeting:getCheckVals('post',POST_ITEMS),
    sigCustomer:getSigData('sig-customer'),
    sigPartner:getSigData('sig-partner'),
    savedAt:new Date().toISOString(),
  };
  upsertRec(rec);
  currentEditId=rec.id;
  showToast('✅ 저장되었습니다!');
  renderCalendar();
  setTimeout(()=>{
    if(isDesktopMode()){ listDateFilter=null; showPanel('list',false); }
    else switchTab('calendar');
  },700);
}

function gv(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

/* ─── 상세보기 ─── */
function openDetail(id) {
  document.querySelectorAll('.record-card').forEach(c=>c.classList.remove('selected'));
  const card=document.getElementById('card-'+id);
  if(card) card.classList.add('selected');

  if(isDesktopMode()) {
    buildDetailContent(id, 'detail-panel-title', 'detail-panel-body');
    // 버튼 추가
    const body=document.getElementById('detail-panel-body');
    const bb=document.createElement('div'); bb.className='btn-bar';
    bb.innerHTML=`
      <button class="btn-main btn-danger" onclick="if(confirm('삭제하시겠습니까?')){deleteRecById('${id}');renderCalendar();showPanel('list',false);showToast('삭제됨');}">🗑️ 삭제</button>
      <button class="btn-main btn-cancel" onclick="loadEdit('${id}')">✏️ 수정</button>
      <button class="btn-main btn-print"  onclick="downloadById('${id}')">⬇️ 다운로드</button>`;
    body.appendChild(bb);
    showPanel('detail');
  } else {
    buildDetailContent(id, 'dm-title', 'dm-body');
    document.getElementById('dm-edit-btn').onclick=()=>{closeModal('detail-modal');loadEdit(id);};
    document.getElementById('dm-dl-btn').onclick=()=>downloadById(id);
    document.getElementById('dm-del-btn').onclick=()=>{closeModal('detail-modal');confirmDeleteRec(id);};
    openModal('detail-modal');
  }
}

function buildDetailContent(id, titleId, bodyId) {
  const r=getRec(id); if(!r) return;
  const tel=document.getElementById(titleId);
  const bel=document.getElementById(bodyId);
  if(tel) tel.textContent=`${formatDateKR(r.date)} · ${r.name||'(이름없음)'}`;

  const prods=Object.entries(r.products||{})
    .filter(([,v])=>(typeof v==='object'?v.checked:!!v))
    .map(([k,v])=>{ const cnt=(typeof v==='object'&&v.count)?` ${v.count}대`:''; return k+cnt; })
    .join(', ')||'-';
  const preH=(r.preMeeting||[]).map((v,i)=>
    `<tr><td style="text-align:center">${i+1}</td>
     <td style="font-size:12px">${PRE_ITEMS[i]}</td>
     <td class="${v==='그렇다'?'cyes':v==='보통'?'cmid':'cno'}" style="text-align:center">${v||'-'}</td></tr>`).join('');
  const postH=(r.postMeeting||[]).map((v,i)=>
    `<tr><td style="text-align:center">${i+1}</td>
     <td style="font-size:12px">${POST_ITEMS[i]}</td>
     <td class="${v==='그렇다'?'cyes':v==='보통'?'cmid':'cno'}" style="text-align:center">${v||'-'}</td></tr>`).join('');

  const befPics=(r.photosBefore||r.photos||[]);
  const aftPics=(r.photosAfter||[]);
  detailPhotos={before:befPics,after:aftPics};
  const mkTP=(p,i,tp)=>`<div class="photo-thumb" onclick="openViewer(detailPhotos.${tp},${i})" title="클릭하여 크게 보기"><img src="${p}"><div class="photo-thumb-overlay"><span>🔍</span></div></div>`;
  const emptyPhotoCell='<div style="aspect-ratio:1;background:#f5f5f5;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;">없음</div>';
  const maxPairs=Math.max(befPics.length,aftPics.length);
  const pairRows=Array.from({length:maxPairs},(_,i)=>`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">
      <div>
        <div style="font-size:10px;font-weight:bold;text-align:center;background:#fff3cd;color:#856404;padding:2px 6px;border-radius:4px 4px 0 0;border:1px solid #ffc107;border-bottom:none;">작업전${maxPairs>1?' '+(i+1):''}</div>
        <div style="border:1px solid #ffc107;border-radius:0 0 4px 4px;padding:4px;">${befPics[i]?mkTP(befPics[i],i,'before'):emptyPhotoCell}</div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:bold;text-align:center;background:#d1f5e0;color:#155724;padding:2px 6px;border-radius:4px 4px 0 0;border:1px solid #28a745;border-bottom:none;">작업후${maxPairs>1?' '+(i+1):''}</div>
        <div style="border:1px solid #28a745;border-radius:0 0 4px 4px;padding:4px;">${aftPics[i]?mkTP(aftPics[i],i,'after'):emptyPhotoCell}</div>
      </div>
    </div>`).join('');
  const photosHtml=maxPairs>0?`<div style="margin-top:12px;"><div style="font-size:12px;font-weight:bold;color:#444;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee;">📷 작업 전/후 사진 비교</div>${pairRows}</div>`:'';

  const sigHtml=`<div style="display:flex;gap:12px;margin-top:10px;">
    <div style="flex:1;text-align:center;">
      <div style="font-size:12px;color:#555;margin-bottom:4px;">고객 서명</div>

    `<div class="photo-thumb" onclick="showPhotoActions('${type}',${i})"><img src="${url}"><div class="photo-thumb-overlay"><span>⋯</span></div></div>`;
  const addCell = (type) =>
    `<div class="photo-pair-empty-cell" onclick="document.getElementById('photo-input-${type}').click()"><span>+</span><small>추가</small></div>`;
  let html = '';
  if (maxLen === 0) {

      <div><div class="photo-pair-tag photo-pair-tag-b">작업전</div>

        <div class="photo-empty-state" style="border:1px solid #28a745;border-top:none;border-radius:0 0 6px 6px;" onclick="document.getElementById('photo-input-after').click()">
          <div style="font-size:24px;">📷</div><span>사진 추가</span></div></div>
    </div>`;
  } else {
    for (let i = 0; i < maxLen; i++) {

      const aCell = photosAfterList[i]  ? mkThumb(photosAfterList[i],  'after',  i) : addCell('after');
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;align-items:start;">
        <div><div class="photo-pair-tag photo-pair-tag-b">작업전${numLabel}</div>
          <div style="border:1px solid #ffc107;border-top:none;border-radius:0 0 4px 4px;padding:4px;display:flex;">${bCell}</div></div>

          <div style="border:1px solid #28a745;border-top:none;border-radius:0 0 4px 4px;padding:4px;display:flex;">${aCell}</div></div>

/* ─── 사진 파일 선택 (추가 방식) ─── */
function handlePhoto(event, type) {
  const files = Array.from(event.target.files); if (!files.length) return;
  const list  = type==='before' ? photosBeforeList : photosAfterList;
  let loaded  = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      list.push(e.target.result);
      loaded++;
      if (loaded === files.length) renderPairThumbs();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = ''; // 동일 파일 재선택 허용
}

/* ─── 서명 ─── */
function initSig(id) {
  const canvas=document.getElementById(id); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  let drawing=false, lx=0, ly=0;
  const pos=e=>{
    const r=canvas.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return{x:(s.clientX-r.left)*(canvas.width/r.width),y:(s.clientY-r.top)*(canvas.height/r.height)};
  };
  const start=e=>{drawing=true;const p=pos(e);lx=p.x;ly=p.y;};
  const move=e=>{
    if(!drawing) return;
    const p=pos(e);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    lx=p.x;ly=p.y;
  };
  const end=()=>drawing=false;
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();start(e);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();move(e);},{passive:false});
  canvas.addEventListener('touchend',end);
}
function clearSig(id){
  const c=document.getElementById(id);
  if(c) c.getContext('2d').clearRect(0,0,c.width,c.height);
  delete _sigData[id];
}
function getSigData(id){
  if(_sigData[id]) return _sigData[id];
  const c=document.getElementById(id); if(!c) return null;
  const d=c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  return Array.from(d).some((v,i)=>i%4===3&&v>0)?c.toDataURL():null;
}
function restoreSig(id,url){
  const c=document.getElementById(id); if(!c||!url) return;
  _sigData[id]=url;
  const img=new Image(); img.onload=()=>c.getContext('2d').drawImage(img,0,0,c.width,c.height); img.src=url;
}

/* ─── 전체화면 서명 ─── */
const _sigData = {}; // 고해상도 서명 dataURL 저장
let _sigTargetId = null;
let _sigFsDrawing = false, _sigFsLx = 0, _sigFsLy = 0;
let _sigFsAbort = null;

function openSigFullscreen(targetId) {
  _sigTargetId = targetId;
  document.getElementById('sig-fs-title').textContent =
    targetId === 'sig-customer' ? '고객 서명' : '파트너 서명';

  const overlay = document.getElementById('sig-fullscreen');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // 레이아웃 완료 후 캔버스 크기 설정
  requestAnimationFrame(() => {
    const c = document.getElementById('sig-fs-canvas');
    c.width  = overlay.clientWidth;
    c.height = overlay.clientHeight
             - overlay.querySelector('.sig-fs-header').offsetHeight
             - overlay.querySelector('.sig-fs-footer').offsetHeight;

    // 기존 서명 복원
    const existing = getSigData(targetId);
    if (existing) {
      const img = new Image();
      img.onload = () => c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      img.src = existing;
    }
    _initSigFsEvents();
  });
}

function _initSigFsEvents() {
  // 이전 이벤트 리스너 정리
  if (_sigFsAbort) _sigFsAbort.abort();
  _sigFsAbort = new AbortController();
  const sig = _sigFsAbort.signal;

  const c = document.getElementById('sig-fs-canvas');
  const ctx = c.getContext('2d');

  const pos = e => {
    const r = c.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return {
      x: (s.clientX - r.left) * (c.width  / r.width),
      y: (s.clientY - r.top)  * (c.height / r.height)
    };
  };
  const start = e => { _sigFsDrawing=true; const p=pos(e); _sigFsLx=p.x; _sigFsLy=p.y; };
  const move  = e => {
    if (!_sigFsDrawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(_sigFsLx,_sigFsLy); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='#111'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    _sigFsLx=p.x; _sigFsLy=p.y;
  };
  const end = () => _sigFsDrawing = false;

  c.addEventListener('mousedown', start, {signal:sig});
  c.addEventListener('mousemove', move,  {signal:sig});
  c.addEventListener('mouseup',   end,   {signal:sig});
  c.addEventListener('mouseleave',end,   {signal:sig});
  c.addEventListener('touchstart', e=>{e.preventDefault();start(e);}, {passive:false, signal:sig});
  c.addEventListener('touchmove',  e=>{e.preventDefault();move(e); }, {passive:false, signal:sig});
  c.addEventListener('touchend',   end,  {signal:sig});
}

function clearSigFullscreen() {
  const c = document.getElementById('sig-fs-canvas');
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

function saveSigFullscreen() {
  const fc = document.getElementById('sig-fs-canvas');
  const d  = fc.getContext('2d').getImageData(0,0,fc.width,fc.height).data;
  const hasContent = Array.from(d).some((v,i) => i%4===3 && v>0);

  if (hasContent) {
    // 고해상도 dataURL로 저장 (케안축소 없이)
    _sigData[_sigTargetId] = fc.toDataURL();
    // 작은 캔버스에는 미리보기만 표시
    const target = document.getElementById(_sigTargetId);
    const tCtx = target.getContext('2d');
    tCtx.clearRect(0, 0, target.width, target.height);
    tCtx.drawImage(fc, 0, 0, target.width, target.height);
  } else {
    clearSig(_sigTargetId);
  }
  closeSigFullscreen();
  showToast('✅ 서명이 저장되었습니다');
}

function closeSigFullscreen() {
  if (_sigFsAbort) { _sigFsAbort.abort(); _sigFsAbort = null; }
  document.getElementById('sig-fullscreen').classList.remove('open');
  document.body.style.overflow = '';
  _sigTargetId = null;
}

/* ─── 모달 ─── */
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ─── 유틸 ─── */
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateKR(ds) {
  if(!ds) return ''; const p=ds.split('-');
  return `${p[0]}년 ${parseInt(p[1])}월 ${parseInt(p[2])}일`;
}
let toastT=null;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500);
}
